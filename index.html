<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexander B. Chen</title>
  <meta name="description" content="High school mathematician, USAMO qualifier, competitive swimmer." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="home">
  <nav class="nav" id="nav"></nav>

  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow" id="hero-subtitle"></p>
      <h1 id="hero-name"></h1>
      <p class="intro" id="hero-intro"></p>
      <div class="hero-tags" id="hero-tags"></div>
    </div>
  </header>

  <main>
    <section class="section split">
      <div class="split-inner" id="home-blurbs"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Where to go</h2>
        <p class="section-lead">A guided tour of the obsessions.</p>
      </div>
      <div class="card-grid" id="home-cards"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="shell.js"></script>
  <script>
    document.addEventListener('site:ready', (e) => {
      const d = e.detail;
      document.getElementById('hero-subtitle').textContent = d.subtitle || '';
      document.getElementById('hero-name').textContent = d.name || '';
      document.getElementById('hero-intro').innerHTML = d.intro || d.tagline || '';

      const tagsHost = document.getElementById('hero-tags');
      (d.heroTags || []).forEach((t) => {
        const s = document.createElement('span');
        s.textContent = t;
        tagsHost.appendChild(s);
      });

      const blurbHost = document.getElementById('home-blurbs');
      (d.homeBlurbs || []).forEach((b) => {
        const wrap = document.createElement('div');
        wrap.className = 'split-item';
        const l = document.createElement('p');
        l.className = 'mono-label';
        l.textContent = b.label;
        wrap.appendChild(l);
        const body = document.createElement('p');
        body.innerHTML = b.body;
        wrap.appendChild(body);
        blurbHost.appendChild(wrap);
      });

      const cards = document.getElementById('home-cards');
      const sections = d.sections || {};
      const tour = [
        { key: 'math', href: 'math.html', label: 'Math', desc: 'Competition record, research, what I read.', hint: 'USAMO · AIME · Anderson model' },
        { key: 'projects', href: 'projects.html', label: 'Projects', desc: '360-page textbook, SSAMO, card magic, mock AMC.', hint: 'Things I made because nobody asked' },
        { key: 'recommendations', href: 'recommendations.html', label: 'Recs', desc: 'Books, videos, problem sets — with ratings.', hint: 'Aggressively opinionated' },
        { key: 'beyond', href: 'beyond.html', label: 'Beyond Math', desc: 'Swimming, piano, skiing, DECA.', hint: 'Where the 5:15am alarm comes in' },
        { key: 'sessions', href: 'sessions.html', label: 'Problem Sessions', desc: 'Apply to do problems with me. Yes, really.', hint: 'Free. Bring your own pencil.' }
      ];
      tour.forEach((t) => {
        if (sections[t.key] === false) return;
        const a = document.createElement('a');
        a.href = t.href;
        a.className = 'tour-card';
        const h = document.createElement('h3');
        h.textContent = t.label;
        a.appendChild(h);
        const p = document.createElement('p');
        p.textContent = t.desc;
        a.appendChild(p);
        const hint = document.createElement('p');
        hint.className = 'mono-hint';
        hint.textContent = t.hint;
        a.appendChild(hint);
        cards.appendChild(a);
      });
    });
  </script>
</body>
</html>
