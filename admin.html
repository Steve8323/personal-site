<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>·</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="styles.css" />

<body class="admin-body">
  <div id="gate" class="gate">
    <h2>Enter passphrase</h2>
    <form id="gate-form">
      <input type="password" id="gate-input" autocomplete="current-password" autofocus />
      <button type="submit" class="btn">Unlock</button>
      <div class="err" id="gate-err"></div>
    </form>
  </div>

  <div id="editor" class="admin-layout" style="display:none">
    <aside class="admin-side">
      <div class="side-head">Editor</div>
      <a href="#sec-identity" class="active">Identity</a>
      <a href="#sec-sections">Sections</a>
      <a href="#sec-writing">Writing link</a>
      <a href="#sec-home">Home page</a>
      <a href="#sec-tags">Hero tags</a>
      <a href="#sec-about">About</a>
      <a href="#sec-comp">Competitions</a>
      <a href="#sec-research">Research</a>
      <a href="#sec-reading">Reading</a>
      <a href="#sec-projects">Projects</a>
      <a href="#sec-recs">Recommendations</a>
      <a href="#sec-act">Beyond math</a>
      <a href="#sec-sessions">Sessions page</a>
      <a href="#sec-applicants">Applicants</a>
      <a href="#sec-contact">Contact</a>
      <a href="#sec-pw">Passphrase</a>
      <div class="side-foot">
        <a href="index.html" target="_blank">View site →</a>
        <a href="#" id="btn-logout-side">Lock</a>
      </div>
    </aside>

    <div class="admin-main">
      <div class="admin-toolbar">
        <button class="btn" id="btn-export">Export data.json</button>
        <button class="btn secondary" id="btn-reload">Reload from data.json</button>
        <span class="spacer"></span>
        <span class="status" id="save-status">Loaded</span>
      </div>
      <div id="form-host"></div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
